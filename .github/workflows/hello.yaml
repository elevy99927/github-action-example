name: CI Example
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Standard Checkout Action
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Example Marketplace Action (e.g., HTTP Request)
      - name: Trigger External API
        uses: fjogeleit/http-request-action@v1
        with:
          url: 'https://example.com'
          method: 'POST'
          data: '{"status": "building"}'
